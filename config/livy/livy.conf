# Livy configuration — Phase 1 (no authentication, Spark standalone)
# Reference: https://livy.apache.org/docs/latest/server/configuration

# Livy server address and port
livy.server.host = 0.0.0.0
livy.server.port = 8998

# No authentication in Phase 1
# Note: Livy 0.9 changed behaviour — setting auth.type=none requires also providing
# livy.server.auth.none.class. Leaving auth.type unset (null) skips authentication entirely,
# which is the correct no-auth approach for local development.
# livy.server.auth.type = none

# Spark master (standalone cluster)
livy.spark.master = spark://spark-master:7077
livy.spark.deploy-mode = client

# Session management
livy.server.session.timeout = 1h
livy.server.session.max-creation = 20
livy.server.session.state-retain.sec = 300

# Allow all users for local dev (no access control needed in Phase 1)
livy.superusers =
livy.impersonation.enabled = false

# File upload (not needed for standalone, but avoids startup warnings)
livy.file.local-dir-whitelist = /tmp
