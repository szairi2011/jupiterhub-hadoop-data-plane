# Livy configuration — Phase 5 (no authentication, YARN back-end)
# Reference: https://livy.apache.org/docs/latest/server/configuration
#
# Phase 6 additions (Kerberos):
#   livy.server.auth.type = kerberos
#   livy.server.auth.kerberos.principal = HTTP/livy-host@REALM
#   livy.server.auth.kerberos.keytab  = /etc/security/livy.keytab
#   livy.impersonation.enabled = true

# Bind on all interfaces so the container is reachable from spark-net
livy.server.host = 0.0.0.0
livy.server.port = 8998

# ---- Authentication -------------------------------------------------------
# Livy 0.9 breaking change: setting auth.type = none also requires
# livy.server.auth.none.class to be set. Leaving the property entirely unset
# (commented out) is the correct way to run with no auth in 0.9.
# livy.server.auth.type = none

# ---- Spark back-end -------------------------------------------------------
# Phase 5: submit to YARN instead of Spark standalone.
# To roll back to standalone: git checkout phase-4
livy.spark.master = yarn
# client mode: Spark driver runs inside the Livy JVM (edge node).
# YARN cluster mode is NOT supported by Livy (driver would move away from Livy).
livy.spark.deploy-mode = client

# ---- Hive context (Phase 3) -----------------------------------------------
# LivyConf.ENABLE_HIVE_CONTEXT controls whether Livy writes
# spark.sql.catalogImplementation=hive (true) or =in-memory (false) into the
# --properties-file it passes to spark-submit.  This overrides any value the
# user supplies in session_configs.conf, so it MUST be set here.
livy.repl.enable-hive-context = true

# ---- Session lifecycle ----------------------------------------------------
# Kill idle session after 1 hour to free Spark executor slots
livy.server.session.timeout = 1h
# Maximum concurrent sessions across all users
livy.server.session.max-creation = 20
# Keep session metadata for 5 min after it finishes (for log retrieval)
livy.server.session.state-retain.sec = 300

# ---- Access control -------------------------------------------------------
# Empty superusers â†’ no one has elevated Livy admin rights (fine for dev)
livy.superusers =
# Impersonation lets Livy submit jobs as the end user (needed with Kerberos/YARN)
livy.impersonation.enabled = false

# ---- File upload whitelist -----------------------------------------------
# Directories Livy is allowed to serve local JARs / files from.
# /tmp is safe for dev; restrict in production.
livy.file.local-dir-whitelist = /tmp
