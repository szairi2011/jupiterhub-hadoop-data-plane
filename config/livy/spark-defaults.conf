# spark-defaults.conf â€” Spark properties loaded at SparkContext creation time.
#
# This file is read by Spark before the SparkContext is built, which is the
# ONLY window to set StaticSQLConf properties such as
# spark.sql.catalogImplementation.
#
# Why this file instead of SparkMagic session_configs.conf ?
#   SparkMagic sends session conf to Livy after the Livy RSC driver has already
#   created and cached the SparkSession.  spark.sql.catalogImplementation is a
#   StaticSQLConf â€” Spark silently ignores any attempt to change it on an
#   already-initialized session.  Writing it here (read at JVM startup) is the
#   correct and only reliable place.
#
# How this file is found:
#   livy-env.sh sets SPARK_CONF_DIR=/opt/livy/conf.
#   docker-compose mounts config/livy/ -> /opt/livy/conf (read-only).
#   Spark's SparkContext init reads $SPARK_CONF_DIR/spark-defaults.conf.

# --- Hive Metastore catalog (Phase 3) ---------------------------------------
# Use the Hive external catalog instead of the default in-memory catalog.
spark.sql.catalogImplementation   hive

# HMS thrift address (belt-and-suspenders: also set via SparkMagic session conf)
spark.hadoop.hive.metastore.uris  thrift://hive-metastore:9083

# --- YARN back-end (Phase 5) -------------------------------------------------
# spark.driver.host MUST equal the Livy container name.
# YARN NodeManager executor JVMs open a TCP callback to this host:port to report
# task status. If Spark picks the wrong address (e.g. 127.0.0.1), executors start
# but immediately disconnect and all tasks hang.
spark.driver.host                  livy
spark.driver.bindAddress           0.0.0.0

# Use /tmp as the YARN staging dir so Spark uploads executor JARs to a
# world-writable HDFS path (avoids needing a pre-created /user/root home dir).
# Note: first YARN job is slow (~1-2 min) while Spark uploads ~220 MB of JARs.
# Subsequent jobs reuse the cached archive.
spark.yarn.stagingDir              hdfs://namenode:9000/tmp

# --- Python worker (Phase 5) -------------------------------------------------
# The NodeManager executor containers ship Python as "python3" (no bare "python"
# symlink in Debian/Ubuntu by default).  Without these two settings Spark looks
# for "python" and executor launch fails with "No such file or directory".
# spark.pyspark.python     -> used by executor JVMs to spawn the Python worker
# spark.pyspark.driver.python -> used by the Spark driver (inside Livy) itself
spark.pyspark.python               python3.10
spark.pyspark.driver.python        python3.10
