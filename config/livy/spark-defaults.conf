# spark-defaults.conf — Spark properties loaded at SparkContext creation time.
#
# This file is read by Spark before the SparkContext is built, which is the
# ONLY window to set StaticSQLConf properties such as
# spark.sql.catalogImplementation.
#
# Why this file instead of SparkMagic session_configs.conf ?
#   SparkMagic sends session conf to Livy after the Livy RSC driver has already
#   created and cached the SparkSession.  spark.sql.catalogImplementation is a
#   StaticSQLConf — Spark silently ignores any attempt to change it on an
#   already-initialized session.  Writing it here (read at JVM startup) is the
#   correct and only reliable place.
#
# How this file is found:
#   livy-env.sh sets SPARK_CONF_DIR=/opt/livy/conf.
#   docker-compose mounts config/livy/ -> /opt/livy/conf (read-only).
#   Spark's SparkContext init reads $SPARK_CONF_DIR/spark-defaults.conf.

# --- Hive Metastore catalog (Phase 3) ---------------------------------------
# Use the Hive external catalog instead of the default in-memory catalog.
spark.sql.catalogImplementation   hive

# HMS thrift address (belt-and-suspenders: also set via SparkMagic session conf)
spark.hadoop.hive.metastore.uris  thrift://hive-metastore:9083
